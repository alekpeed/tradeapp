appId: com.tradeapp.desktop
productName: TradeApp
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - '**/*.node'
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
extraResources: []
publish:
  provider: github
  owner: alekpeed
  repo: tradeapp
