name: iOS Engine tests

# Verifies the Swift port of the P&L engine (ios/Engine) with the same assertions
# as the TypeScript engine. Runs on a plain Linux Swift toolchain — no Mac needed.
on:
  push:
    paths:
      - 'ios/Engine/**'
      - '.github/workflows/ios-engine.yml'
  workflow_dispatch:

jobs:
  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Run engine tests
        run: swift test --package-path ios/Engine
