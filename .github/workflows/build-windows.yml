name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Needed so electron-builder can publish a GitHub Release when triggered by a
# version tag (the auto-updater reads that release's latest.yml to find updates).
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      # Tag pushes (v1.2.3) publish a real GitHub Release + latest.yml, which
      # is what the in-app auto-updater checks against.
      - name: Build and publish Windows installer (tagged release)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      # Manual "Run workflow" clicks just produce a downloadable test build,
      # no release is published.
      - name: Build Windows installer (manual test build)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeApp-windows-installer
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 90
